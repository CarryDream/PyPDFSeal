name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 前端构建检查：只验证 TypeScript 和 Vite 构建，不做 Tauri 打包。
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 使用 npm ci 读取 package-lock.json，避免 CI 安装出和本地不同的依赖树。
      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  # Rust 代码检查：三大桌面平台都跑，尽早发现平台相关编译问题。
  check-rust:
    name: Check Rust Code
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Tauri 的 generate_context!() 宏会在编译期验证 frontendDist 指向的目录是否存在。
      # cargo check / clippy 不依赖前端产物，但需要目录存在才能通过宏展开。
      - name: Create placeholder dist directory for Tauri context
        run: mkdir -p dist

      # Tauri 2 在 Linux 上依赖 WebKitGTK 4.1、GTK、ayatana appindicator 等系统库。
      - name: Install dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf \
            pkg-config libsoup-3.0-dev javascriptcoregtk-4.1 \
            libjavascriptcoregtk-4.1-dev libnm-dev xdg-utils

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check Rust formatting
        run: cargo fmt -- --check
        working-directory: src-tauri

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri

      - name: Check Rust compilation
        run: cargo check
        working-directory: src-tauri

  # Tauri 构建测试：只验证应用能在各平台编译，不生成安装包，避免 CI 依赖发布签名密钥。
  build-tauri:
    name: Build Tauri App
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf \
            pkg-config libsoup-3.0-dev javascriptcoregtk-4.1 \
            libjavascriptcoregtk-4.1-dev libnm-dev xdg-utils

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (debug, no bundle)
        run: npm run tauri -- build --debug --no-bundle
        env:
          # CI 环境不做应用签名；安装包和 updater artifacts 只在 Release workflow 生成。
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
