name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-info:
    name: Prepare Release Info
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_name: ${{ steps.release.outputs.release_name }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Tag 发布使用 tag 名；手动触发生成一个 prerelease 名称，但不反向 push tag。
      - name: Prepare release info
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            prerelease=false
          else
            app_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
            short_sha="${GITHUB_SHA::7}"
            stamp="$(date -u +'%Y%m%d.%H%M%S')"
            tag="v${app_version}-build.${stamp}.${short_sha}"
            prerelease=true
          fi

          echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=PyPDFSeal ${tag}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

  build-tauri:
    name: Build ${{ matrix.label }}
    needs: release-info
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows 只发布 NSIS 的 setup.exe（用户选择），同时发布 updater artifacts。
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"
            label: macos-arm64

          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: "x86_64-apple-darwin"
            label: macos-x64

          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
            label: linux-x64

          - platform: ubuntu-24.04-arm
            args: ""
            rust_targets: ""
            label: linux-arm64

          - platform: windows-latest
            args: ""
            rust_targets: ""
            label: windows-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Tauri 2 在 Linux 上依赖 WebKitGTK 4.1、GTK、ayatana appindicator 等系统库。
      - name: Install dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf \
            pkg-config libsoup-3.0-dev javascriptcoregtk-4.1 \
            libjavascriptcoregtk-4.1-dev libnm-dev xdg-utils

      - name: Rust setup
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Rust setup with targets
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 使用 lockfile 安装，避免 release 构建时解析出和本地不同的依赖版本。
      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build ${{ matrix.args }} --ci

      # 先上传到 Actions Artifacts，最后由 publish-release 统一创建/更新 Release。
      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.label }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/nsis/*.sig
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/**/release/bundle/dmg/*.sig
            src-tauri/target/**/release/bundle/deb/*.sig
            src-tauri/target/**/release/bundle/appimage/*.sig
            src-tauri/target/**/release/bundle/updater/*.json
          if-no-files-found: warn

  publish-release:
    name: Publish GitHub Release
    needs: [release-info, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: release-assets-*
          merge-multiple: true

      - name: Stage release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files
          # Flatten all artifact files into a single directory
          find all-artifacts -type f -exec cp -t release-files {} +
          # Stage updater manifest
          manifest="$(find release-files -name '*.json' -type f | head -n 1 || true)"
          if [ -n "$manifest" ]; then
            cp "$manifest" release-files/latest.json
          else
            echo "No updater manifest found. Check Tauri updater signing configuration." >&2
          fi
          echo "Release files:"
          ls -lh release-files/

      # README 当前没有按版本维护 changelog；没有提取到内容时使用默认说明。
      - name: Extract Release Notes
        shell: bash
        run: |
          VERSION="${{ needs.release-info.outputs.release_tag }}"
          echo "Extracting release notes for version $VERSION"
          awk -v ver="$VERSION" '
            BEGIN { capture=0 }
            $0 ~ "^[[:space:]]*[*+-][[:space:]]+\\*\\*" ver { capture=1; next }
            capture && $0 ~ "^[[:space:]]*[*+-][[:space:]]+\\*\\*v" { capture=0; exit }
            capture { print }
          ' README.md | sed 's/^[[:space:]]\{8\}//' > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "See the assets below to download this version." > release_notes.md
          fi

      - name: Create or Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: ${{ needs.release-info.outputs.release_tag }}
          commit: ${{ github.sha }}
          name: ${{ needs.release-info.outputs.release_name }}
          bodyFile: release_notes.md
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: release-files/*
          artifactErrorsFailBuild: true
          replacesArtifacts: true
          prerelease: ${{ needs.release-info.outputs.prerelease == 'true' }}
          makeLatest: legacy
