name: Build Executables

on:
  push:
    tags:
      - "v*"
  pull_request:          # 新增：PR 时也跑 CI（推荐）
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write       # 发布 Release 需要

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            artifact: PyPDFSeal-windows-x64.exe

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            artifact: PyPDFSeal-linux-x64

          - platform: macos-15
            target: aarch64-apple-darwin
            label: macos-arm64
            artifact: PyPDFSeal-macos-arm64

          - platform: macos-15
            target: x86_64-apple-darwin
            label: macos-x64
            artifact: PyPDFSeal-macos-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Linux 依赖
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl file libayatana-appindicator3-dev \
            libssl-dev libwebkit2gtk-4.1-dev libxdo-dev \
            librsvg2-dev patchelf wget libgtk-3-dev

      # Rust 工具链
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 缓存（Tauri 项目推荐这样写）
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      # 构建（关键：加上 --target）
      - name: Build Tauri executable
        run: npm run tauri:build:exe -- --target ${{ matrix.target }} --ci

      # 整理产物
      - name: Stage executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          $source = "${{ matrix.executable }}"   # ← 注意这里你原来没写 matrix.executable
          if (!(Test-Path $source)) {
            throw "Executable not found: $source"
          }
          Copy-Item $source "artifacts/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: artifacts/${{ matrix.artifact }}
          if-no-files-found: error

      # 只有打 tag 时才发布 Release
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          files: artifacts/${{ matrix.artifact }}