name: Build Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            executable: src-tauri/target/x86_64-pc-windows-msvc/release/pydfseal.exe
            artifact: PyPDFSeal-windows-x64.exe
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            executable: src-tauri/target/x86_64-unknown-linux-gnu/release/pydfseal
            artifact: PyPDFSeal-linux-x64
          - platform: macos-15
            target: aarch64-apple-darwin
            label: macos-arm64
            executable: src-tauri/target/aarch64-apple-darwin/release/pydfseal
            artifact: PyPDFSeal-macos-arm64
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            label: macos-x64
            executable: src-tauri/target/x86_64-apple-darwin/release/pydfseal
            artifact: PyPDFSeal-macos-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            wget

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build executable
        run: npm run tauri:build:exe -- --target ${{ matrix.target }} --ci

      - name: Stage executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          $source = "${{ matrix.executable }}"
          if (!(Test-Path $source)) {
            throw "Executable not found: $source"
          }
          Copy-Item $source "artifacts/${{ matrix.artifact }}"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: artifacts/${{ matrix.artifact }}
          if-no-files-found: error

      - name: Upload tagged release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          files: artifacts/${{ matrix.artifact }}
